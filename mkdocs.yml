site_name: DevOps Projects Documentation
site_description: Catalog, runbooks, flagship guides, and reusable security baselines for the DevOps Projects repository.
site_url: https://devcloudninjas.github.io/DevOps-Projects/
repo_url: https://github.com/DevCloudNinjas/DevOps-Projects
docs_dir: docs
theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: green
      accent: deep orange
  font: false
extra_css:
  - stylesheets/portal.css
plugins:
  - search
  - privacy
  - offline
nav:
  - Home: index.md
  - Catalog:
      - Overview: catalog/index.md
      - Project Picker: catalog/project-picker.md
  - Run Safely:
      - Overview: runbooks/index.md
      - Student Implementation Guide: runbooks/student-implementation-guide.md
      - Credentials and Cost Safety: runbooks/credentials-and-cost-safety.md
      - IaC and Kubernetes: iac-kubernetes-solid-runbook.md
  - Learning Paths:
      - Overview: learning-paths/index.md
      - Beginner: learning-paths/beginner.md
      - Docker/Kubernetes: learning-paths/docker-kubernetes.md
      - Terraform/IaC: learning-paths/terraform-iac.md
      - CI/CD: learning-paths/cicd.md
      - DevSecOps: learning-paths/devsecops.md
      - AWS: learning-paths/aws.md
      - Platform Engineering 2026: learning-paths/platform-engineering-2026.md
  - Project README Template: project-readme-template.md
  - Flagship Docs:
      - Overview: flagship/index.md
  - Community:
      - Overview: community/index.md
      - Contributing: community/contributing.md
      - Support: community/support.md
      - Roadmap: community/roadmap.md
  - Marketing:
      - Overview: marketing/index.md
  - Security Baselines:
      - Overview: security-baselines/index.md
      - Kubernetes: security-baselines/kubernetes.md
      - Terraform: security-baselines/terraform.md
      - Dockerfile: security-baselines/dockerfile.md
      - CI/CD: security-baselines/cicd.md
      - Secrets: security-baselines/secrets.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
